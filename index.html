<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 图床 - 快速上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .config-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .config-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f0f0;
        }

        .upload-area.active {
            border-color: #667eea;
            background: #fffaeb;
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-area p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .upload-area small {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .file-preview {
            margin-bottom: 20px;
        }

        .preview-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .preview-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 12px;
        }

        .preview-info {
            flex: 1;
            min-width: 0;
        }

        .preview-name {
            color: #333;
            font-size: 13px;
            font-weight: 500;
            word-break: break-all;
        }

        .preview-size {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        .preview-remove {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            flex: 0 0 auto;
            margin-left: 10px;
        }

        .preview-remove:hover {
            color: #ff4757;
        }

        .result-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .result-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-url {
            flex: 1;
            word-break: break-all;
            color: #333;
            font-size: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .result-copy {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            flex: 0 0 auto;
        }

        .result-copy:hover {
            color: #764ba2;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }

        .help-text {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .preview-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .preview-item img {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 GitHub 图床</h1>
            <p>快速上传图片到 GitHub，获取直链 CDN 加速</p>
        </div>

        <div class="config-section">
            <h3>⚙️ GitHub 配置</h3>
            
            <div class="form-group">
                <label for="token">Personal Access Token *</label>
                <input 
                    type="password" 
                    id="token" 
                    placeholder="ghp_xxxxxxxxxxxxxxx (需要 repo 权限)"
                    autocomplete="off"
                >
                <div class="help-text">
                    📖 获取方式: Settings → Developer settings → Personal access tokens → Generate new token (classic) → 勾选 repo 权限
                </div>
            </div>

            <div class="form-group">
                <label for="username">GitHub 用户名 *</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="你的 GitHub 用户名"
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label for="repo">仓库名称 *</label>
                <input 
                    type="text" 
                    id="repo" 
                    placeholder="pic-bed（不含用户名）"
                    autocomplete="off"
                    value="pic-bed"
                >
            </div>

            <div class="form-group">
                <label for="branch">分支名称</label>
                <input 
                    type="text" 
                    id="branch" 
                    placeholder="main"
                    autocomplete="off"
                    value="main"
                >
            </div>

            <div class="form-group">
                <label for="path">存储路径</label>
                <input 
                    type="text" 
                    id="path" 
                    placeholder="images（可选，留空为根目录）"
                    autocomplete="off"
                    value="images"
                >
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="useCDN" checked>
                    使用 jsDelivr CDN 加速（推荐国内用户）
                </label>
            </div>
        </div>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在上传...</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>点击或拖拽上传图片</p>
                <small>支持 JPG、PNG、GIF、WebP 等格式，单个文件 ≤ 25MB</small>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="file-preview" id="filePreview"></div>

        <div class="button-group">
            <button class="btn-upload" id="uploadBtn">上传图片</button>
            <button class="btn-secondary" id="clearBtn">清空</button>
        </div>

        <div class="result-section" id="resultSection" style="display: none;">
            <h3>✨ 上传结果</h3>
            <div id="results"></div>
        </div>

        <div class="footer">
            <p>💡 提示: Token 仅保存在本地浏览器，不会上传到任何服务器</p>
            <p>支持拖拽多个文件批量上传 | 点击复制图片链接</p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filePreview = document.getElementById('filePreview');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageEl = document.getElementById('message');
        const loadingEl = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultsDiv = document.getElementById('results');

        const tokenInput = document.getElementById('token');
        const usernameInput = document.getElementById('username');
        const repoInput = document.getElementById('repo');
        const branchInput = document.getElementById('branch');
        const pathInput = document.getElementById('path');
        const useCDNInput = document.getElementById('useCDN');

        let selectedFiles = [];

        // 恢复保存的配置
        function loadConfig() {
            const saved = localStorage.getItem('githubConfig');
            if (saved) {
                const config = JSON.parse(saved);
                tokenInput.value = config.token || '';
                usernameInput.value = config.username || '';
                repoInput.value = config.repo || 'pic-bed';
                branchInput.value = config.branch || 'main';
                pathInput.value = config.path || 'images';
                useCDNInput.checked = config.useCDN !== false;
            }
        }

        // 保存配置
        function saveConfig() {
            const config = {
                token: tokenInput.value,
                username: usernameInput.value,
                repo: repoInput.value,
                branch: branchInput.value,
                path: pathInput.value,
                useCDN: useCDNInput.checked
            };
            localStorage.setItem('githubConfig', JSON.stringify(config));
        }

        loadConfig();

        // 上传区域拖拽处理
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('active');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(file => {
                if (!file.type.startsWith('image/')) {
                    showMessage('只支持图片格式', 'error');
                    return false;
                }
                if (file.size > 25 * 1024 * 1024) {
                    showMessage(`${file.name} 超过 25MB 限制`, 'error');
                    return false;
                }
                return true;
            });

            renderPreview();
        }

        function renderPreview() {
            filePreview.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';
                    item.innerHTML = `
                        <img src="${e.target.result}" alt="${file.name}">
                        <div class="preview-info">
                            <div class="preview-name">${file.name}</div>
                            <div class="preview-size">${(file.size / 1024).toFixed(2)} KB</div>
                        </div>
                        <button class="preview-remove" onclick="removeFile(${index})">✕</button>
                    `;
                    filePreview.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            renderPreview();
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = '';
            renderPreview();
            resultSection.style.display = 'none';
        });

        uploadBtn.addEventListener('click', uploadFiles);

        async function uploadFiles() {
            if (selectedFiles.length === 0) {
                showMessage('请先选择图片', 'info');
                return;
            }

            const token = tokenInput.value.trim();
            const username = usernameInput.value.trim();
            const repo = repoInput.value.trim();
            const branch = branchInput.value.trim();
            const path = pathInput.value.trim();

            if (!token || !username || !repo) {
                showMessage('Token、用户名和仓库名不能为空', 'error');
                return;
            }

            saveConfig();

            uploadBtn.disabled = true;
            loadingEl.classList.add('show');
            resultsDiv.innerHTML = '';

            let successCount = 0;
            const uploadPromises = selectedFiles.map(file => 
                uploadFile(file, token, username, repo, branch, path)
            );

            const results = await Promise.all(uploadPromises);
            results.forEach(result => {
                if (result.success) {
                    successCount++;
                    renderResult(result);
                } else {
                    showMessage(result.error, 'error');
                }
            });

            loadingEl.classList.remove('show');
            uploadBtn.disabled = false;

            if (successCount > 0) {
                resultSection.style.display = 'block';
                showMessage(`成功上传 ${successCount} 张图片`, 'success');
            }
        }

        async function uploadFile(file, token, username, repo, branch, path) {
            try {
                const reader = new FileReader();
                
                return new Promise((resolve) => {
                    reader.onload = async (e) => {
                        const base64Content = e.target.result.split(',')[1];
                        const fileName = `${Date.now()}_${file.name}`;
                        const filePath = path ? `${path}/${fileName}` : fileName;

                        try {
                            const response = await fetch(
                                `https://api.github.com/repos/${username}/${repo}/contents/${filePath}`,
                                {
                                    method: 'PUT',
                                    headers: {
                                        'Authorization': `token ${token}`,
                                        'Content-Type': 'application/json',
                                        'Accept': 'application/vnd.github.v3+json'
                                    },
                                    body: JSON.stringify({
                                        message: `Upload ${file.name}`,
                                        content: base64Content,
                                        branch: branch
                                    })
                                }
                            );

                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.message || `HTTP ${response.status}`);
                            }

                            const data = await response.json();
                            const rawUrl = data.content.download_url;
                            
                            // 使用 CDN 加速链接
                            let finalUrl = rawUrl;
                            if (useCDNInput.checked) {
                                finalUrl = `https://cdn.jsdelivr.net/gh/${username}/${repo}@${branch}/${filePath}`;
                            }

                            resolve({
                                success: true,
                                fileName: file.name,
                                uploadedName: fileName,
                                url: finalUrl,
                                rawUrl: rawUrl
                            });
                        } catch (error) {
                            resolve({
                                success: false,
                                fileName: file.name,
                                error: error.message
                            });
                        }
                    };
                    reader.readAsDataURL(file);
                });
            } catch (error) {
                return {
                    success: false,
                    fileName: file.name,
                    error: error.message
                };
            }
        }

        function renderResult(result) {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <div class="result-url">${result.url}</div>
                <button class="result-copy" onclick="copyToClipboard('${result.url}')" title="复制链接">📋</button>
            `;
            resultsDiv.appendChild(item);
        }

        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showMessage('链接已复制到剪贴板', 'success');
            }).catch(() => {
                showMessage('复制失败，请手动复制', 'error');
            });
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message show ${type}`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
